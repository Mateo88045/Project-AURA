# Supabase project config.
# Run `supabase link --project-ref <ref>` to associate this directory with a remote project.
# Then `supabase db push` to apply migrations, `supabase functions deploy <name>` to deploy Edge Functions.

project_id = "aura"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "aura://"
additional_redirect_urls = ["aura://onboarding/connect"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ─── Edge Functions ─────────────────────────────────────────────────────────
[edge_runtime]
enabled = true
ip_version = "ipv4"

[functions.daily-trigger]
verify_jwt = false  # cron-invoked; auth check happens in the function via CRON_SECRET

[functions.sunday-briefing]
verify_jwt = false

[analytics]
enabled = false
